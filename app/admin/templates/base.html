<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}GoldVault Admin{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            gold: { 50:'#fffbeb',100:'#fef3c7',200:'#fde68a',300:'#fcd34d',400:'#fbbf24',500:'#f59e0b',600:'#d97706',700:'#b45309',800:'#92400e',900:'#78350f' },
          }
        }
      }
    }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    body { font-family: 'Inter', sans-serif; }
    .sidebar-link { display:flex; align-items:center; gap:0.75rem; padding:0.75rem 1rem; border-radius:0.5rem; color:#d1d5db; transition:all 0.2s; }
    .sidebar-link:hover { background:rgba(120,53,15,0.3); color:#fbbf24; }
    .sidebar-link.active { background:rgba(120,53,15,0.4); color:#fbbf24; font-weight:500; }
  </style>
</head>
<body class="h-full bg-gray-950 text-gray-100">

{% if admin %}
<div class="flex h-full min-h-screen">

  <!-- Mobile backdrop -->
  <div id="sidebar-backdrop"
       class="fixed inset-0 bg-black/60 z-40 hidden"
       onclick="closeSidebar()"></div>

  <!-- Sidebar -->
  <aside id="sidebar"
         class="fixed lg:relative top-0 left-0 h-full w-64 flex flex-col shrink-0
                bg-gray-900 border-r border-gray-800 z-50
                -translate-x-full lg:translate-x-0 transition-transform duration-300 ease-in-out">

    <!-- Logo -->
    <div class="px-6 py-5 border-b border-gray-800 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <div class="w-9 h-9 rounded-lg bg-gradient-to-br from-yellow-400 to-yellow-600 flex items-center justify-center text-gray-900 font-bold text-lg">G</div>
        <div>
          <p class="font-semibold text-white text-sm">GoldVault</p>
          <p class="text-xs text-gray-400">Admin Panel</p>
        </div>
      </div>
      <!-- Close button (mobile only) -->
      <button onclick="closeSidebar()" class="lg:hidden p-1.5 rounded-lg text-gray-400 hover:bg-gray-800 hover:text-white transition">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
        </svg>
      </button>
    </div>

    <!-- Nav -->
    <nav class="flex-1 px-3 py-4 space-y-1 overflow-y-auto">
      <a href="/admin/dashboard" onclick="closeSidebar()"
         class="sidebar-link {% if request.url.path == '/admin/dashboard' %}active{% endif %}">
        <svg class="w-5 h-5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
        Dashboard
      </a>
      <a href="/admin/users" onclick="closeSidebar()"
         class="sidebar-link {% if '/admin/users' in request.url.path %}active{% endif %}">
        <svg class="w-5 h-5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
        Users
      </a>
      <a href="/admin/orders" onclick="closeSidebar()"
         class="sidebar-link {% if '/admin/orders' in request.url.path %}active{% endif %}">
        <svg class="w-5 h-5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>
        Orders
      </a>
      <a href="/admin/withdrawals" onclick="closeSidebar()"
         class="sidebar-link {% if '/admin/withdrawals' in request.url.path %}active{% endif %}">
        <svg class="w-5 h-5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
        Withdrawals
      </a>
      <a href="/admin/settings" onclick="closeSidebar()"
         class="sidebar-link {% if '/admin/settings' in request.url.path %}active{% endif %}">
        <svg class="w-5 h-5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
        Settings
      </a>
    </nav>

    <!-- User / Logout -->
    <div class="px-3 py-4 border-t border-gray-800">
      <div class="flex items-center justify-between px-4 py-2">
        <span class="text-sm text-gray-400 truncate">{{ admin.username }}</span>
        <a href="/admin/logout" class="text-xs text-yellow-400 hover:text-yellow-300 shrink-0 ml-2">Logout</a>
      </div>
    </div>
  </aside>

  <!-- Main wrapper -->
  <div class="flex flex-col flex-1 min-w-0 min-h-screen">

    <!-- Mobile top bar -->
    <div class="lg:hidden sticky top-0 z-30 flex items-center gap-3 px-4 py-3 bg-gray-900 border-b border-gray-800">
      <button onclick="toggleSidebar()"
              class="p-2 rounded-lg text-gray-400 hover:bg-gray-800 hover:text-white transition">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
        </svg>
      </button>
      <div class="flex items-center gap-2">
        <div class="w-7 h-7 rounded-lg bg-gradient-to-br from-yellow-400 to-yellow-600 flex items-center justify-center text-gray-900 font-bold text-sm">G</div>
        <span class="font-semibold text-white text-sm">GoldVault Admin</span>
      </div>
    </div>

    <!-- Page content -->
    <main class="flex-1 overflow-auto">
      <div class="px-4 sm:px-6 lg:px-8 py-6">
        {% block content %}{% endblock %}
      </div>
    </main>
  </div>

</div>
{% else %}
  {% block auth_content %}{% endblock %}
{% endif %}

<script>
function toggleSidebar() {
  const sidebar = document.getElementById('sidebar');
  const backdrop = document.getElementById('sidebar-backdrop');
  sidebar.classList.toggle('-translate-x-full');
  backdrop.classList.toggle('hidden');
}
function closeSidebar() {
  const sidebar = document.getElementById('sidebar');
  const backdrop = document.getElementById('sidebar-backdrop');
  sidebar.classList.add('-translate-x-full');
  backdrop.classList.add('hidden');
}

{% if request.url.path == '/admin/dashboard' %}
setTimeout(() => location.reload(), 60000);
{% endif %}
</script>
</body>
</html>
