version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: goldbot_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-gold_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-gold_pass}
      POSTGRES_DB: ${POSTGRES_DB:-gold_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-gold_user} -d ${POSTGRES_DB:-gold_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: goldbot_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: docker/api/Dockerfile
    container_name: goldbot_api
    restart: unless-stopped
    env_file: .env
    environment:
      - SERVICE=api
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./app:/app/app
    command: >
      sh -c "alembic -c migrations/alembic.ini upgrade head &&
             uvicorn app.api.main:app --host 0.0.0.0 --port 8000 --workers 4 --log-level info"

  bot:
    build:
      context: .
      dockerfile: docker/bot/Dockerfile
    container_name: goldbot_bot
    restart: unless-stopped
    env_file: .env
    environment:
      - SERVICE=bot
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_started
    volumes:
      - ./app:/app/app
    command: python -m app.bot.main

  worker:
    build:
      context: .
      dockerfile: docker/worker/Dockerfile
    container_name: goldbot_worker
    restart: unless-stopped
    env_file: .env
    environment:
      - SERVICE=worker
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./app:/app/app
    command: celery -A app.worker.celery_app worker --loglevel=info --concurrency=4

  beat:
    build:
      context: .
      dockerfile: docker/worker/Dockerfile
    container_name: goldbot_beat
    restart: unless-stopped
    env_file: .env
    depends_on:
      - redis
      - worker
    volumes:
      - ./app:/app/app
    command: celery -A app.worker.celery_app beat --loglevel=info --scheduler celery.beat.PersistentScheduler

  flower:
    build:
      context: .
      dockerfile: docker/worker/Dockerfile
    container_name: goldbot_flower
    restart: unless-stopped
    env_file: .env
    ports:
      - "5555:5555"
    depends_on:
      - worker
    command: celery -A app.worker.celery_app flower --port=5555

volumes:
  postgres_data:
  redis_data:

networks:
  default:
    name: goldbot_network
